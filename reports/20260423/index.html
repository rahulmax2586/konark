<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Weather Report</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.8);
            --modal-bg: rgba(15, 23, 42, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        #date-range {
            color: var(--text);
            font-weight: 400;
            font-size: 1.1rem;
            opacity: 0.8;
        }

        /* Controls Bar */
        .controls-bar {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 40px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 250px;
        }

        .control-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            font-weight: 600;
            padding-left: 5px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        input, select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        select option {
            background: var(--bg);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 25px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border-color: var(--accent);
        }

        .card:hover::before {
            opacity: 1;
        }

        .symbol {
            font-size: 4rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.4));
        }

        .city-name {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .condition {
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 20px;
            text-transform: capitalize;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        .card-date-range {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            gap: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 20px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .forecast-container {
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            padding-top: 18px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .forecast-day {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            transition: background 0.2s ease;
        }

        .forecast-day:hover {
            background: rgba(56, 189, 248, 0.1);
        }

        .forecast-weekday {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 2px;
            font-weight: 700;
        }

        .forecast-date {
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .forecast-icon {
            font-size: 1.4rem;
            margin-bottom: 6px;
        }

        .forecast-temp {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .forecast-rain {
            font-size: 0.65rem;
            color: var(--accent);
            opacity: 0.8;
        }

        .see-all-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .see-all-btn:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Modal Styles */
        #detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #detail-modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--modal-bg);
            width: 90%;
            max-width: 800px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            max-height: 85vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s ease;
        }

        .close-btn:hover {
            color: var(--accent);
        }

        .modal-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .modal-subtitle {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        .hourly-chart {
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            height: 280px;
            padding-top: 50px;
            padding-bottom: 60px;
            margin-bottom: 40px;
            gap: 15px;
            overflow-x: auto;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hourly-bar {
            flex: 0 0 50px;
            background: linear-gradient(to top, var(--accent), #818cf8);
            border-radius: 8px 8px 0 0;
            position: relative;
            transition: height 0.5s ease;
        }

        .hourly-bar:hover {
            filter: brightness(1.2);
        }

        .hourly-val {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .hourly-time {
            position: absolute;
            bottom: -45px;
            left: 50%;
            transform: translateX(-50%) rotate(-45deg);
            font-size: 0.7rem;
            white-space: nowrap;
            color: var(--accent);
            font-weight: 500;
        }

        #full-forecast-modal .modal-content {
            max-width: 1000px;
        }

        .full-forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }

        .full-day-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .full-day-card:hover {
            background: rgba(56, 189, 248, 0.1);
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .footer-note {
            text-align: center;
            margin-top: 80px;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding-bottom: 40px;
        }

        /* Empty state */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px;
            font-size: 1.5rem;
            color: var(--text-muted);
            background: var(--card-bg);
            border-radius: 28px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            .controls-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Weather Intelligence</h1>
            <p id="date-range">Analytics across Ireland</p>
        </header>

        <div class="controls-bar">
            <div class="control-group">
                <label class="control-label" for="city-search">Select or Search City</label>
                <div class="input-wrapper">
                    <input type="text" id="city-search" placeholder="Type to filter cities..." list="city-list">
                    <datalist id="city-list"></datalist>
                </div>
            </div>

            <div class="control-group">
                <label class="control-label" for="sort-by">Sort Results By</label>
                <select id="sort-by">
                    <option value="name-asc">City Name (A-Z)</option>
                    <option value="name-desc">City Name (Z-A)</option>
                    <option value="high-desc">Highest Temperature</option>
                    <option value="low-asc">Lowest Temperature</option>
                    <option value="rain-desc">Maximum Precipitation</option>
                    <option value="wind-desc">Strongest Wind</option>
                </select>
            </div>
        </div>

        <div id="weather-grid" class="grid"></div>

        <div class="footer-note">
            Computational Data • Met Éireann Open Access Service • Irish Meteorological Institute
        </div>
    </div>

    <!-- Modal -->
    <div id="detail-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <div id="modal-city" class="modal-title">City Name</div>
                <div id="modal-date" class="modal-subtitle">Date details</div>
            </div>
            <div id="modal-body">
                <div class="hourly-chart" id="hourly-chart"></div>
            </div>
        </div>
    </div>

    <!-- Full Forecast Modal -->
    <div id="full-forecast-modal" class="modal-search" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); z-index: 999; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease;">

            <span class="close-btn" onclick="closeFullForecast()">&times;</span>
            <div class="modal-header">
                <div id="full-modal-city" class="modal-title">City Name</div>
                <div id="full-modal-info" class="modal-subtitle">Full Period Forecast</div>
            </div>
            <div id="full-forecast-grid" class="full-forecast-grid"></div>
        </div>
    </div>

    <script>
        const SYMBOL_MAP = {
            'Sun': '☀️', 'Cloud': '☁️', 'PartlyCloud': '⛅', 'LightCloud': '🌤️',
            'Rain': '🌧️', 'LightRain': '🌦️', 'Showers': '🌦️', 'HeavyRain': '⛈️',
            'Snow': '❄️', 'Sleet': '🌨️', 'Fog': '🌫️', 'Mist': '🌫️',
            'Thunder': '⚡', 'Mixed': '🌈'
        };

        let masterData = [];

        function getEmoji(condition) {
            if (!condition) return '🌡️';
            for (const key in SYMBOL_MAP) {
                if (condition.includes(key)) return SYMBOL_MAP[key];
            }
            return '🌡️';
        }

        function formatShortDate(dateStr) {
            const parts = dateStr.split('-');
            return `${parts[2]}/${parts[1]}`;
        }

        function showDayDetails(cityIndex, dayIndex) {
            const city = masterData[cityIndex];
            const day = city.Forecast[dayIndex];
            
            document.getElementById('modal-city').innerText = city.City;
            document.getElementById('modal-date').innerText = `${day.Day}, ${day.Date}`;
            
            const chart = document.getElementById('hourly-chart');
            chart.innerHTML = '';
            
            if (!day.Hourly || day.Hourly.length === 0) {
                chart.innerHTML = '<p style="width:100%; text-align:center">No hourly data available for this day.</p>';
            } else {
                // Find min/max for scaling
                const temps = day.Hourly.map(h => h.temp);
                const min = Math.min(...temps) - 1;
                const max = Math.max(...temps) + 1;
                const range = max - min;
                
                day.Hourly.forEach(hour => {
                    const barHeight = ((hour.temp - min) / range) * 100;
                    const bar = document.createElement('div');
                    bar.className = 'hourly-bar';
                    bar.style.height = `${Math.max(barHeight, 5)}%`;
                    
                    // Conditional color based on temperature
                    if (hour.temp > 10) {
                        bar.style.background = 'linear-gradient(to top, #facc15, #fef08a)'; // Yellow
                        bar.style.boxShadow = '0 0 10px rgba(250, 204, 21, 0.4)';
                    }

                    bar.innerHTML = `
                        <span class="hourly-val">${hour.temp}°</span>
                        <span class="hourly-time">${hour.time}</span>
                    `;
                    chart.appendChild(bar);
                });
            }
            
            document.getElementById('detail-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.remove('active');
        }

        function showFullForecast(cityIndex) {
            const city = masterData[cityIndex];
            document.getElementById('full-modal-city').innerText = city.City;
            document.getElementById('full-modal-info').innerText = city.Dates;
            
            const grid = document.getElementById('full-forecast-grid');
            grid.innerHTML = '';
            
            city.Forecast.forEach((day, dayIdx) => {
                const dayCard = document.createElement('div');
                dayCard.className = 'full-day-card';
                dayCard.onclick = () => {
                    closeFullForecast();
                    showDayDetails(cityIndex, dayIdx);
                };
                dayCard.innerHTML = `
                    <span class="forecast-weekday">${day.Day.substring(0,3)}</span>
                    <span class="forecast-date">${formatShortDate(day.Date)}</span>
                    <span class="forecast-icon">${getEmoji(day.Condition)}</span>
                    <span class="forecast-temp">${day.High}° / ${day.Low}°</span>
                `;
                grid.appendChild(dayCard);
            });
            
            const modal = document.getElementById('full-forecast-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.style.opacity = '1', 10);
        }

        function closeFullForecast() {
            const modal = document.getElementById('full-forecast-modal');
            modal.style.opacity = '0';
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function renderGrid(data) {
            const grid = document.getElementById('weather-grid');
            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = '<div class="no-results">No cities match your current filter</div>';
                return;
            }

            data.forEach(city => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let forecastHtml = '';
                if (city.Forecast && city.Forecast.length > 0) {
                    forecastHtml = '<div class="forecast-container">';
                    // Limit to 3 days in the card
                    city.Forecast.slice(0, 3).forEach((day, dayIdx) => { 
                        forecastHtml += `
                            <div class="forecast-day" onclick="showDayDetails(${masterData.indexOf(city)}, ${dayIdx})">
                                <span class="forecast-weekday">${day.Day.substring(0,3)}</span>
                                <span class="forecast-date">${formatShortDate(day.Date)}</span>
                                <span class="forecast-icon" title="${day.Condition}">${getEmoji(day.Condition)}</span>
                                <span class="forecast-temp">${day.High}° / ${day.Low}°</span>
                                <span class="forecast-rain">${day.Rain}mm</span>
                            </div>
                        `;
                    });
                    forecastHtml += '</div>';
                    
                    if (city.Forecast.length > 3) {
                        forecastHtml += `<button class="see-all-btn" onclick="showFullForecast(${masterData.indexOf(city)})">See All Days</button>`;
                    }
                }

                card.innerHTML = `
                    <div class="symbol">${getEmoji(city.Condition)}</div>
                    <div class="city-name">${city.City}</div>
                    <div class="condition">${city.Condition}</div>
                    <div class="card-date-range">${city.Dates}</div>
                    ${forecastHtml}
                `;
                grid.appendChild(card);
            });
        }

        function handleControls() {
            const searchTerm = document.getElementById('city-search').value.toLowerCase();
            const sortBy = document.getElementById('sort-by').value;

            let filtered = masterData.filter(city => 
                city.City.toLowerCase().includes(searchTerm)
            );

            filtered.sort((a, b) => {
                switch(sortBy) {
                    case 'name-asc': return a.City.localeCompare(b.City);
                    case 'name-desc': return b.City.localeCompare(a.City);
                    case 'high-desc': return b.High - a.High;
                    case 'low-asc': return a.Low - b.Low;
                    case 'rain-desc': return b.Rain - a.Rain;
                    case 'wind-desc': return b.WindSpeed - a.WindSpeed;
                    default: return 0;
                }
            });

            renderGrid(filtered);
        }

        function init() {
            if (!window.weatherData || window.weatherData.length === 0) {
                document.getElementById('weather-grid').innerHTML = '<div class="no-results">Weather data not loaded yet</div>';
                return;
            }

            masterData = window.weatherData;
            
            // Populate datalist
            const datalist = document.getElementById('city-list');
            masterData.forEach(city => {
                const opt = document.createElement('option');
                opt.value = city.City;
                datalist.appendChild(opt);
            });

            document.getElementById('date-range').innerHTML = `Forecast Data for: <strong>${masterData[0].Dates}</strong>`;
            
            // Initial render
            handleControls();

            // Event Listeners
            document.getElementById('city-search').addEventListener('input', handleControls);
            document.getElementById('sort-by').addEventListener('change', handleControls);
            
            // Close modals on outside click
            window.onclick = function(event) {
                const detailModal = document.getElementById('detail-modal');
                const fullModal = document.getElementById('full-forecast-modal');
                if (event.target == detailModal) closeModal();
                if (event.target == fullModal) closeFullForecast();
            }
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
